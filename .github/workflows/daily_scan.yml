name: Peregrine Daily Federal Scanner

on:
  schedule:
    # 7:00 AM ET = 12:00 UTC (EST Nov-Mar) | 11:00 UTC (EDT Mar-Nov)
    # Using 12:00 UTC to fire at 7am EST; will arrive ~6am during EDT
    - cron: '0 12 * * 1-5'   # Weekdays Mon-Fri at 7am EST
    # For 7 days/week coverage, change to:
    # - cron: '0 12 * * *'
  workflow_dispatch:          # Manual trigger from GitHub Actions UI

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run Peregrine Daily Scanner
        id: scanner
        env:
          SAM_API_KEY:      ${{ secrets.SAM_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_TO:         mike.kelly@peregrine.io
          EMAIL_FROM:       mikefkelly26@gmail.com
        run: python daily_scan.py

      - name: Upload HTML digest as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}-${{ github.run_number }}
          path: "digest_*.html"
          retention-days: 60

      - name: Send failure alert
        if: failure()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python - <<'PYEOF'
          import requests, os
          requests.post(
            "https://api.sendgrid.com/v3/mail/send",
            headers={"Authorization": f"Bearer {os.environ['SENDGRID_API_KEY']}", "Content-Type": "application/json"},
            json={
              "personalizations": [{"to": [{"email": "mike.kelly@peregrine.io"}]}],
              "from": {"email": "mikefkelly26@gmail.com", "name": "Peregrine Federal Scanner"},
              "subject": "Peregrine Scanner Failed Today",
              "content": [{"type": "text/plain", "value": "The daily scanner failed. Check GitHub Actions logs for details."}],
            }
          )
          print("Failure alert sent")
          PYEOF
