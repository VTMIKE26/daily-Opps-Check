name: Peregrine Daily Federal Scanner

on:
  schedule:
    # 7:00 AM EST (UTC-5) = 12:00 UTC  — runs year-round at 12:00 UTC
    # Note: GitHub Actions cron uses UTC. EST = UTC-5, EDT = UTC-4.
    # This fires at 7am EST (winter) and 8am EDT (summer).
    # To always fire at exactly 7am ET, you would need two cron entries.
    # For simplicity we use 12:00 UTC which delivers at 7am EST Nov-Mar.
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner
        env:
          SAM_API_KEY:      ${{ secrets.SAM_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_TO:         mike.kelly@peregrine.io
          EMAIL_FROM:       mikefkelly26@gmail.com
        run: python daily_scan.py

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: digest_*.html
          retention-days: 60

      - name: Alert on failure
        if: failure()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python - <<'PYEOF'
          import requests, os
          requests.post(
            "https://api.sendgrid.com/v3/mail/send",
            headers={"Authorization": f"Bearer {os.environ['SENDGRID_API_KEY']}",
                     "Content-Type": "application/json"},
            json={
              "personalizations": [{"to": [{"email": "mike.kelly@peregrine.io"}],
                                    "subject": "⚠️ Peregrine Scanner Failed"}],
              "from": {"email": "mikefkelly26@gmail.com",
                       "name": "Peregrine Federal Scanner"},
              "content": [{"type": "text/plain",
                           "value": "The daily scanner failed. Check GitHub Actions logs."}],
            }
          )
          PYEOF
