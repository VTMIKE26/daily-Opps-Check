name: Peregrine Daily Federal Scanner

on:
  # Primary trigger: called by cron-job.org via workflow_dispatch
  # cron-job.org hits: POST /repos/VTMIKE26/daily-Opps-Check/actions/workflows/daily_scan.yml/dispatches
  # This fires at EXACTLY 7:00 AM EST/EDT every weekday — no GitHub queue delays
  workflow_dispatch:

  # Backup: GitHub native cron in case cron-job.org misses a day
  # Scheduled slightly later (7:20am) so it only runs if dispatch didn't fire
  schedule:
    - cron: '20 12 * * 1-5'   # 7:20 AM EST backup (UTC 12:20)
    - cron: '20 11 * * 1-5'   # 7:20 AM EDT backup (UTC 11:20)

concurrency:
  group: peregrine-daily-scanner
  cancel-in-progress: false

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner
        env:
          SAM_API_KEY:      ${{ secrets.SAM_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_TO:         mike.kelly@peregrine.io
          EMAIL_FROM:       mikefkelly26@gmail.com
        run: python daily_scan.py

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: digest_*.html
          retention-days: 30

      - name: Alert on failure
        if: failure()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python - <<'PYEOF'
          import requests, os
          requests.post(
            "https://api.sendgrid.com/v3/mail/send",
            headers={"Authorization": f"Bearer {os.environ['SENDGRID_API_KEY']}",
                     "Content-Type": "application/json"},
            json={
              "personalizations": [{"to": [{"email": "mike.kelly@peregrine.io"}],
                                    "subject": "⚠️ Peregrine Scanner Failed Today"}],
              "from": {"email": "mikefkelly26@gmail.com", "name": "Peregrine Scanner"},
              "content": [{"type": "text/plain",
                           "value": "The scanner failed. Check: https://github.com/VTMIKE26/daily-Opps-Check/actions"}],
            }
          )
          PYEOF
