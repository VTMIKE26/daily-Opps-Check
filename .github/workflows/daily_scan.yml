name: Peregrine Daily Federal Scanner

on:
  schedule:
    # PRIMARY: 7:00 AM EST = 12:00 UTC (fires at 7am EST / 8am EDT)
    - cron: '0 12 * * 1-5'
    # BACKUP: 7:15 AM EST = 12:15 UTC — catches GitHub scheduler delays
    - cron: '15 12 * * 1-5'
  workflow_dispatch:  # Manual trigger from GitHub Actions UI

# Prevent duplicate runs if both crons fire close together
concurrency:
  group: daily-scanner-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner
        env:
          SAM_API_KEY:      ${{ secrets.SAM_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_TO:         mike.kelly@peregrine.io
          EMAIL_FROM:       mikefkelly26@gmail.com
        run: python daily_scan.py

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: digest_*.html
          retention-days: 60

      - name: Alert on failure
        if: failure()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python - <<'PYEOF'
          import requests, os
          requests.post(
            "https://api.sendgrid.com/v3/mail/send",
            headers={"Authorization": f"Bearer {os.environ['SENDGRID_API_KEY']}",
                     "Content-Type": "application/json"},
            json={
              "personalizations": [{"to": [{"email": "mike.kelly@peregrine.io"}],
                                    "subject": "Peregrine Scanner Failed Today"}],
              "from": {"email": "mikefkelly26@gmail.com",
                       "name": "Peregrine Federal Scanner"},
              "content": [{"type": "text/plain",
                           "value": "The daily scanner failed. Check GitHub Actions logs at https://github.com/VTMIKE26/daily-Opps-Check/actions"}],
            }
          )
          PYEOF
