name: Keep Workflows Active

# GitHub DISABLES scheduled workflows after 60 days of repo inactivity.
# This workflow commits a timestamp every weekday morning at 6:50 AM EST
# BEFORE the scanner fires, guaranteeing the repo stays "active".
# Without this, your scanner will silently stop running after ~2 months.

on:
  schedule:
    - cron: '50 11 * * 1-5'   # 6:50 AM EDT
    - cron: '50 10 * * 1-5'   # 6:50 AM EST (extra safety)
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update activity timestamp
        run: |
          mkdir -p .github
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > .github/last_active.txt
          git config user.name  "Peregrine Bot"
          git config user.email "actions@github.com"
          git add .github/last_active.txt
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: keep-alive $(date -u '+%Y-%m-%d') [skip ci]" && git push)
