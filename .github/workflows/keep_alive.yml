name: Keep Workflows Active

# Commits a timestamp every weekday to prevent GitHub disabling
# scheduled workflows after 60 days of repo inactivity.

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 6:00 AM EST (UTC 11) — before scanner fires
  workflow_dispatch:

concurrency:
  group: peregrine-keep-alive
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Timestamp commit
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > .github/last_active.txt
          git config user.name "Peregrine Bot"
          git config user.email "actions@github.com"
          git add .github/last_active.txt
          git diff --staged --quiet && echo "No change" || \
            git commit -m "chore: keep-alive $(date -u '+%Y-%m-%d') [skip ci]" && git push
